name: glamme
description: "Мобильное приложение GlamMe."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
     - assets/images/
     - assets/icons/

  fonts:
     - family: Roscha
       fonts:
         - asset: assets/fonts/Roscha-Regular.ttf


